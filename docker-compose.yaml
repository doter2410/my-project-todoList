services:
  todoapp-postgres:
    image: postgres:18.3-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-port-forwarder
    # Добавляем restart, чтобы проброс не падал, если БД еще не готова
    restart: always
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"  # Исправлен пробел после дефиса
    depends_on:
      - todoapp-postgres